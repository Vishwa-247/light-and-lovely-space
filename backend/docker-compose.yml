version: '3.8'

services:
  # API Gateway - Central entry point
  api-gateway:
    build: 
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: studymate_gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=https://jwmsgrodliegekbrhvgt.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL:-}
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - RESUME_ANALYZER_URL=http://resume-analyzer:8003
      - PROFILE_SERVICE_URL=http://profile-service:8006
    networks:
      - studymate_network

  # Resume Analyzer Service - Priority service
  resume-analyzer:
    build:
      context: ./agents/resume-analyzer
      dockerfile: Dockerfile
    container_name: studymate_resume_analyzer
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - SUPABASE_URL=https://jwmsgrodliegekbrhvgt.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    networks:
      - studymate_network

  # Profile Service - Essential for profile building
  profile-service:
    build:
      context: ./agents/profile-service
      dockerfile: Dockerfile
    container_name: studymate_profile_service
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      - SUPABASE_URL=https://jwmsgrodliegekbrhvgt.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    networks:
      - studymate_network


networks:
  studymate_network:
    driver: bridge